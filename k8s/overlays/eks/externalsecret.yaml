# Syncs the Secrets Manager "pwyw/app-secrets" JSON into the K8s `app-secrets`
# Secret that the Deployment reads via envFrom. The JSON keys (DATABASE_URL,
# DIRECT_URL, SUPABASE_SERVICE_ROLE_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET)
# become Secret keys. Values live only in Secrets Manager — never in git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: pwyw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: pwyw/app-secrets
