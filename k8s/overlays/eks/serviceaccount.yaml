# App ServiceAccount bound to its IRSA role (modules/irsa app_role_arn output), so
# the pod can generate S3/CloudFront signed download URLs without node-wide creds.
# Replace the annotation value with the real role ARN at deploy — placeholder only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pwyw-web
  namespace: pwyw
  labels:
    app.kubernetes.io/name: pwyw-web
    app.kubernetes.io/part-of: pwyw
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_APP_IRSA_ROLE_ARN
