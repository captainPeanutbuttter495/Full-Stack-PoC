# External Secrets Operator store pointing at AWS Secrets Manager, authenticated by
# the operator's IRSA ServiceAccount (modules/irsa external_secrets role). Replace
# REGION at deploy — no account ID or secret material here.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: REGION
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
