# Next.js standalone app (node server.js, port 3000).
#
# replicas: 1 is a PoC choice — there is no live cluster. Production would run
# >=2 replicas for availability and zero-downtime rolling updates.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwyw-web
  namespace: pwyw
  labels:
    app.kubernetes.io/name: pwyw-web
    app.kubernetes.io/part-of: pwyw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pwyw-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pwyw-web
        app.kubernetes.io/part-of: pwyw
    spec:
      # Pod runs as the same non-root uid/gid baked into the image (nextjs:1001).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      # If the GHCR package is private, create a pull secret and uncomment:
      #   kubectl -n pwyw create secret docker-registry ghcr-pull \
      #     --docker-server=ghcr.io --docker-username=<user> --docker-password=<token>
      # imagePullSecrets:
      #   - name: ghcr-pull
      containers:
        - name: web
          # Primary deployable tag. For a pinned rollout, swap to an immutable
          # commit-SHA tag (ghcr.io/captainpeanutbuttter495/full-stack-poc:<sha>).
          # Do NOT use :latest as the deploy tag.
          image: ghcr.io/captainpeanutbuttter495/full-stack-poc:production-main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          # Public config + server-only secrets, supplied as env.
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          # Dependency-free probes hit /api/health (no DB/Stripe), so a probe
          # never fails because a downstream service is slow.
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem is intentionally NOT enabled: the Next.js
            # standalone server writes to .next/cache at runtime. Hardening it
            # would require mounting emptyDir volumes for the cache and /tmp.
